<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tetris</title>
</head>

<body class="bg-[#ababab]">

    <div class="upbar relative bg-[#dedede]  z-4 w-full text-center align-middle h-30 shadow-xl">
        <h1 class="flex items-center justify-center h-full text-center m-auto text-[50px] font-bold text-[#ff0089] ">
            TETRIS</h1>
    </div>

    <div class="msg justify-center flex items-center m-auto">
        <h2 id="message"
            class="absolute mt-30 items-center text-center bg-white text-[30px] justify-center items-center text-black font-bold rounded-xl ">
        </h2>
    </div>
    <img src="img/360_F_399503722_wW2pL8G3Hy7LcXhxxoYxOvtVaF48n8EZ.jpg"
        class="flex h-full w-full mt-[-450px] z-1 opacity-60">

    <div class="buttons fixed flex-col z-5 mt-[-800px]">
        <div class="box flex flex-col mt-30 ml-100">
            <label class="font-bold mb-5 text-[24px]">Insira seu nome de usuário</label>
            <input id="username" type="text" placeholder="     User@1234"
                class=" flex justify-center items-center h-20 w-100 bg-[#00b7ff] shadow-xl">
        </div>
        <a href="tetris.html">
            <div class="box flex flex-col mt-15 ml-100">
                <button id="btnPlay" type="button"
                    class="h-30 w-100 bg-[#ff2d95] hover:bg-[#a10057] text-[#fff2f9] font-bold text-[40px] shadow-xl cursor-pointer ">INICIAR</button>
            </div>
        </a>
        <a href="ranking.html">
            <div class="box flex flex-col mt-15 ml-100">
                <button type="button"
                    class="h-25 w-100 bg-[#b026ff] hover:bg-[#73018a] text-[#fff2f9] font-bold text-[40px] shadow-xl cursor-pointer">RANKING</button>
            </div>
        </a>

        <div class="imgSide relative h-full">
            <img src="img/Untitled design.png" class="relative h-full ml-250 bottom-150">
        </div>

    </div>
    <script>

        const msg = document.getElementById("message")
        const btnPlay = document.getElementById("btnPlay").addEventListener("click", (e) => {
            e.preventDefault()
            if (document.getElementById("username").value == "") {
                msg.textContent = "⚠️Campo de nome de usuário vazio!"
            }
            window.location.href = "tetris.html"
        })


    </script>

</body>

</html>
