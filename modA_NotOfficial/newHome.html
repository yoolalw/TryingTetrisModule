<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>BrainTetris</title>
</head>

<body class="bg-[#f7f7f7]">
    <div class="all relative">

        <div
            class="cabecalho fixed h-30 bg-[#f7f7f7] w-full z-5 shadow-xl align-middle m-auto items-center justify-center">
            <div class="title h-full items-center justify-center align-middle m-auto text-center">
                <h1 class="h-full text-center m-auto font-bold text-[#333] text-[70px]">BRAINTETRIS</h1>
            </div>
        </div>
        <div class="item flex h-30 w-full"></div>


        <div class="div flex justify-center items-center align-middle h-full mt-4">
            <img src="img/icon.png" class="flex z-10 h-[500px] ">
        </div>
        <div class="buttons flex z-4 mt-20 h-full justify-center align-middle">
            <div class="box align-middle items-center justify-center m-auto ">
                <label class="flex z-10 ">Insira seu nome de usuário!</label>
                <input type="text" placeholder="Player1111" class="flex z-10 h-[120px]
                shadow-lg w-[500px] bg-[#AED6F1] hover:bg-[#A2DED0] font-bold justify-center align-middle
                m-auto items-center text-[50px] text-[#333]">
            </div>
            <div class="btn flex z-10 mt-[0px]">

                <a href="tetris.html">
                    <button type="button"
                        class="flex z-10 h-[120px] shadow-lg w-[500px] bg-[#AED6F1] hover:bg-[#A2DED0] cursor-pointer font-bold justify-center align-middle m-auto items-center text-[50px] text-[#333]">INICIAR</button>
                </a>
                <div class="btn2 ml-20">
                    <a href="ranking.html">
                        <button type="button"
                            class="flex h-[120px] z-10 shadow-lg w-[500px] bg-[#A2DED0] hover:bg-[#AED6F1] cursor-pointer font-bold justify-center align-middle m-auto items-center text-[50px] text-[#333]">RANKING</button>
                    </a>
                </div>
            </div>
        </div>

        <div class="bg">
            <img src="img/bg.jpg" class=" fixed w-full h-[900px] bottom-10 object-cover z-0" alt="bg">
        </div>

    </div>
</body>

</html>
